<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FootballTix</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="login-container">
        <!-- Left Side: Login Form -->
        <div class="login-form-section">
            <div class="login-header">
                <h1 class="logo-text">FootballTix</h1>
            </div>

            <div class="login-content">
                <h2 class="login-title">Sign in to Football</h2>
                <p class="login-subtitle">Enter your details below</p>

                <div id="alert" class="alert mb-4 hidden"></div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username" class="form-label">E-mail</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" placeholder="john.doe@gmail.com"
                                class="form-input" required autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="••••••••"
                                class="form-input" required>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <div class="button-group">
                        <button type="submit" id="loginBtn" class="btn-signin">
                            SIGN IN
                        </button>
                        <button type="button" class="btn-signup" onclick="window.location.href='register.html'">
                            SIGN UP
                        </button>
                    </div>

                    <!-- Google Sign-In Divider -->
                    <div class="divider">
                        <span class="divider-line"></span>
                        <span class="divider-text">or continue with</span>
                        <span class="divider-line"></span>
                    </div>

                    <!-- Google Sign-In Button -->
                    <button type="button" id="googleSignInBtn" class="btn-google" onclick="handleGoogleLogin()">
                        <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        <span>Sign in with Google</span>
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <a href="important-information.html" class="footer-link">Important information</a>
                <a href="privacy-policy.html" class="footer-link">Privacy policy</a>
                <p class="footer-copyright">© 2026 FootballTix. All rights reserved.</p>
            </div>
        </div>

        <!-- Right Side: Background Image -->
        <div class="login-image-section">
            <div class="image-background"></div>

            <!-- Bottom Right Text and Button -->
            <div class="bottom-right-content">
                <p class="account-question">Don't have an account?</p>
                <button class="btn-get-started" onclick="window.location.href='register.html'">
                    GET STARTED
                </button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-text">Loading...</div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
